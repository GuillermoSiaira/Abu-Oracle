version: '3.8'
services:
  abu_engine:
    build: ./abu_engine
    container_name: abu_engine
    ports:
      - "8000:8000"
    restart: always

  lilly_swarm:
    build: ./lilly_swarm
    container_name: lilly_swarm
    ports:
      - "8001:8001"
    restart: always
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ABU_ENGINE_URL=http://abu_engine:8000
      # Agrega otras variables necesarias aquí

  next_app:
    build: ./next_app
    container_name: next_app
    ports:
      - "3000:3000"
    restart: always
    environment:
      - NEXT_PUBLIC_ABU_URL=http://abu_engine:8000
      - NEXT_PUBLIC_LILLY_URL=http://lilly_swarm:8001
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    volumes:
      - ./next_app/public:/app/public
