services:
  abu_engine:
    build: ./abu_engine
    container_name: abu_engine
    ports:
      - "8000:8000"
    restart: always

  lilly_swarm:
    build: ./lilly_swarm
    container_name: lilly_swarm
    ports:
      - "8001:8001"
    restart: always
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ABU_ENGINE_URL=http://abu_engine:8000
      # Agrega otras variables necesarias aquí

  next_app:
    build:
      context: ./next_app
      args:
        - NEXT_PUBLIC_ABU_URL=http://localhost:8000
        - NEXT_PUBLIC_LILLY_URL=http://localhost:8001
    container_name: next_app
    ports:
      - "3000:3000"
    restart: always
    environment:
      # Server-side (Docker internal network) — usado en API routes proxy
      - ABU_ENGINE_URL=http://abu_engine:8000
      - LILLY_ENGINE_URL=http://lilly_swarm:8001
      # Client-side baked at build — apuntan a puertos expuestos del host
      - NEXT_PUBLIC_ABU_URL=http://localhost:8000
      - NEXT_PUBLIC_LILLY_URL=http://localhost:8001
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    volumes:
      - ./next_app/public:/app/public
      - ./data/external:/app/data/external:ro
