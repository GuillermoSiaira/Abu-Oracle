# Aider configuration for ai-oracle repo
# Docs: https://aider.chat/docs/config/aider_conf.html
#
# Por qué este archivo existe:
# Por default Aider levanta cualquier API key que encuentre en env vars
# (ANTHROPIC_API_KEY, OPENAI_API_KEY, etc.) y usa esa, lo cual quema
# créditos Anthropic. Este conf fuerza el uso de Gemini 2.5 Pro vía
# Vertex AI usando ADC, consumiendo créditos GCP (que tienen expiración).
#
# Para override puntual: pasar --model en la línea de comandos.

# ── Modelo principal ──────────────────────────────────────────────
# Gemini 2.5 Pro vía Vertex AI (autenticación por ADC, no API key)
model: vertex_ai/gemini-2.5-pro

# Modelo débil para tareas chicas: repo-map summarization, commit messages,
# fact-checking. ~10x más barato que el principal.
weak-model: vertex_ai/gemini-2.5-flash

# ── Configuración Vertex AI ───────────────────────────────────────
# Requiere: gcloud auth application-default login (ya hecho)
# Requiere: que GOOGLE_APPLICATION_CREDENTIALS NO esté seteada
#           (la limpiamos del scope User; verificar si reaparece)
set-env:
  - VERTEXAI_PROJECT=abu-oracle
  - VERTEXAI_LOCATION=us-central1

# ── Seguridad ─────────────────────────────────────────────────────
# Nunca auto-commitear: vos revisás los diffs en VS Code antes de commit
auto-commits: false

# ── Idioma de respuesta ───────────────────────────────────────────
# Que Lilly... digo, que Aider responda en español argentino
chat-language: Spanish
