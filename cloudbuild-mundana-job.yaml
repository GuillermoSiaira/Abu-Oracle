# 2. Crear el Cloud Scheduler trigger (08:00 UTC diario):
#    gcloud scheduler jobs create http mundana-publisher-daily \
#      --schedule="0 8 * * *" \
#      --uri="https://us-central1-run.googleapis.com/apis/run.googleapis.com/v1/namespaces/abu-oracle/jobs/mundana-publisher:run" \
#      --message-body="{}" \
