steps:
  # ── 1. Build ──────────────────────────────────────────────────────────────
  # Construye desde la raíz del repo para incluir scripts/mundana/ + data/mundana/ + abu_engine/ephe/
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - -t
      - gcr.io/abu-oracle/mundana-publisher:latest
      - -f
      - scripts/mundana/Dockerfile
      - .

  # ── 2. Push ───────────────────────────────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - push
      - gcr.io/abu-oracle/mundana-publisher:latest

  # ── 3. Update Cloud Run Job image ─────────────────────────────────────────
  # El job se crea manualmente la primera vez con:
  #   gcloud run jobs create mundana-publisher \
  #     --image=gcr.io/abu-oracle/mundana-publisher:latest \
  #     --region=us-central1 \
  #     --service-account=abu-engine-sa@abu-oracle.iam.gserviceaccount.com \
  #     --set-env-vars=ANTHROPIC_API_KEY=...,NEYNAR_API_KEY=...,... \
  #     --max-retries=1 \
  #     --task-timeout=300s
  # Este step solo actualiza la imagen en deploys posteriores.
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    args:
      - gcloud
      - run
      - jobs
      - update
      - mundana-publisher
      - --image=gcr.io/abu-oracle/mundana-publisher:latest
      - --region=us-central1

images:
  - gcr.io/abu-oracle/mundana-publisher:latest

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_STANDARD_2

# ── Notas de setup inicial ─────────────────────────────────────────────────
#
# 1. Crear el Cloud Run Job (una vez):
#    gcloud run jobs create mundana-publisher \
#      --image=gcr.io/abu-oracle/mundana-publisher:latest \
#      --region=us-central1 \
#      --service-account=abu-engine-sa@abu-oracle.iam.gserviceaccount.com \
#      --set-secrets=ANTHROPIC_API_KEY=anthropic-api-key:latest,\
#        NEYNAR_API_KEY=neynar-api-key:latest,\
#        FARCASTER_SIGNER_UUID=farcaster-signer-uuid:latest,\
